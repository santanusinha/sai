[project]
site_name = "SAI - Sentinel AI"
site_description = "A powerful CLI-based AI agent with multi-provider support, session management, and extensible skills"
site_author = "Santanu Sinha"
site_url = "https://santanusinha.github.io/sai/"
repo_name = "santanusinha/sai"
repo_url = "https://github.com/santanusinha/sai"
edit_uri = "edit/main/docs/"

nav = [
  {"Home" = "index.md"},
  {"Getting Started" = [
    {"Installation" = "getting-started/installation.md"},
    {"Quick Start" = "getting-started/quickstart.md"},
    {"Configuration" = "getting-started/configuration.md"}
  ]},
  {"User Guides" = [
    {"Running SAI" = "guides/running.md"},
    {"Personas" = "guides/personas.md"},
    {"Agent Skills" = "guides/skills.md"},
    {"Interactive Commands" = "guides/interactive-commands.md"}
  ]},
  {"Reference" = [
    {"CLI Options" = "reference/cli-options.md"},
    {"Subcommands" = "reference/subcommands.md"},
    {"Environment Variables" = "reference/environment.md"},
    {"Persona Format" = "reference/persona-format.md"}
  ]},
  {"Examples" = [
    {"Use Cases" = "examples/use-cases.md"}
  ]}
]

[project.theme]
features = [
  "announce.dismiss",
  "content.action.edit",
  "content.action.view",
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.footnote.tooltips",
  "content.tabs.link",
  "content.tooltips",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.path",
  "navigation.sections",
  "navigation.tabs",
  "navigation.tabs.sticky",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
  "search.share",
  "search.suggest",
  "toc.follow"
]
font.text = "Roboto"
font.code = "Roboto Mono"

[project.theme.icon]
repo = "fontawesome/brands/github"

[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "material/brightness-auto"
toggle.name = "Switch to light mode"
primary = "indigo"
accent = "cyan"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "indigo"
accent = "cyan"
toggle.icon = "material/brightness-7"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "indigo"
accent = "cyan"
toggle.icon = "material/brightness-4"
toggle.name = "Switch to system preference"

[project.extra]
generator = false

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/santanusinha/sai"

[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.tables]
[project.markdown_extensions.pymdownx.arithmatex]
generic = true
[project.markdown_extensions.pymdownx.betterem]
smart_enable = "all"
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.snippets]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]
